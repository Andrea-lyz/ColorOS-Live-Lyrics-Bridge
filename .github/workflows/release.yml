name: Release APK Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v2.0.0. Empty means current ref name."
        required: false
        type: string
      lyric_provider_ref:
        description: "LyricProvider ref to build."
        required: false
        default: "master"
        type: string

permissions:
  contents: write

env:
  JAVA_VERSION: "21"
  LSP_REPO: Xposed-Modules-Repo/io.github.andrealtb.lockscreenlyrics

jobs:
  build-bridge:
    name: Build ColorOS Live Lyrics Bridge
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version_name: ${{ steps.meta.outputs.version_name }}
      lsp_tag: ${{ steps.meta.outputs.lsp_tag }}
    steps:
      - name: Checkout bridge
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.release_tag || github.ref_name }}"
          if [[ -z "$tag" || "$tag" == "main" ]]; then
            echo "release_tag is required when workflow_dispatch is not running on a tag" >&2
            exit 1
          fi
          version_name="${tag#v}"
          version_code="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n1)"
          if [[ -z "$version_code" ]]; then
            echo "Unable to resolve versionCode from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "lsp_tag=${version_code}-${version_name}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.SIGNING_KEY }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed bridge release
        shell: bash
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleRelease -PreleaseTag="${{ steps.meta.outputs.release_tag }}"
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk \
            "out/ColorOS-Live-Lyrics-Bridge-${{ steps.meta.outputs.release_tag }}.apk"

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-apk
          path: out/*.apk
          if-no-files-found: error

  build-qq-provider:
    name: Build LyricProvider QQ
    runs-on: ubuntu-latest
    needs: build-bridge
    steps:
      - name: Checkout LyricProvider
        uses: actions/checkout@v4
        with:
          repository: Andrea-lyz/LyricProvider
          ref: ${{ github.event.inputs.lyric_provider_ref || 'master' }}
          token: ${{ secrets.LYRIC_PROVIDER_TOKEN || github.token }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.SIGNING_KEY }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed QQ provider release
        shell: bash
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :qq-music:assembleRelease
          mkdir -p out
          qq_apk="$(find qq-music/build/outputs/apk/release -name '*.apk' -type f | head -n1)"
          if [[ -z "$qq_apk" ]]; then
            echo "QQ provider APK not found" >&2
            exit 1
          fi
          cp "$qq_apk" "out/LyricProvider-QQMusic-${{ needs.build-bridge.outputs.release_tag }}.apk"

      - name: Upload QQ provider artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyricprovider-qq-apk
          path: out/*.apk
          if-no-files-found: error

