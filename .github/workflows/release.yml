    runs-on: ubuntu-latest
    needs: build-bridge
    steps:
      - name: Checkout LyricProvider
        uses: actions/checkout@v4
        with:
          repository: Andrea-lyz/LyricProvider
          ref: ${{ github.event.inputs.lyric_provider_ref || 'master' }}
          token: ${{ secrets.LYRIC_PROVIDER_TOKEN || github.token }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        shell: bash
        run: |
          set -euo pipefail
