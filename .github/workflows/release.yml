          provider_apk="$(find apple-music/build/outputs/apk/release -name '*.apk' -type f | head -n1)"
          if [[ -z "$provider_apk" ]]; then
            echo "Apple Music provider APK not found" >&2
            exit 1
          fi
          cp "$provider_apk" "out/LyricProvider-AppleMusic-${{ needs.build-bridge.outputs.release_tag }}.apk"

      - name: Upload Apple Music provider artifact
        uses: actions/upload-artifact@v4
        with:
