name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.18.32"
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to the tag when empty."
        required: false
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
            "release-artifacts/ColorOS-Live-Lyrics-Bridge-${{ inputs.tag }}-debug.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: release-artifacts/*.apk
