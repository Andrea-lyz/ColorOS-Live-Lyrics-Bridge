  publish:
    name: Publish GitHub and LSP releases
    runs-on: ubuntu-latest
    needs:
      - build-bridge
      - build-qq-provider
      - build-163-provider
      - build-apple-provider
      - build-poweramp-provider
      - build-spotify-provider
      - build-qishui-provider
    steps:
      - name: Checkout bridge release notes
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish source repository release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-bridge.outputs.release_tag }}
          VERSION_NAME: ${{ needs.build-bridge.outputs.version_name }}
        run: |
          set -euo pipefail
          mapfile -t apk_files < <(find dist -name '*.apk' -type f | sort)
          if [[ "${#apk_files[@]}" -eq 0 ]]; then
            echo "No APK files found" >&2
            exit 1
          fi
          notes_file=".github/release-notes/${VERSION_NAME}.md"
          body_file="$RUNNER_TEMP/source-release-body.md"
          donation_image_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/PY_QR.png"
          append_donation() {
            local file="$1"
            local image_url="$2"
            perl -0pi -e 's/\n?<!-- donation:start -->.*?<!-- donation:end -->\n?/\n/s' "$file"
            {
              printf '\n\n<!-- donation:start -->\n'
              printf '## Donate\n\n'
              printf '<img src="%s" alt="WeChat and Alipay donation QR code" width="600" height="400">\n' "$image_url"
              printf '<!-- donation:end -->\n'
            } >> "$file"
          }
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [[ -f "$notes_file" ]]; then
              cp "$notes_file" "$body_file"
            else
              gh release view "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --json body \
                --jq '.body // ""' > "$body_file"
            fi
            append_donation "$body_file" "$donation_image_url"
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes-file "$body_file"
            gh release upload "$RELEASE_TAG" "${apk_files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          elif [[ -f "$notes_file" ]]; then
            cp "$notes_file" "$body_file"
            append_donation "$body_file" "$donation_image_url"
            gh release create "$RELEASE_TAG" "${apk_files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes-file "$body_file"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$RELEASE_TAG" \
              --jq '.body // ""' > "$body_file"
            append_donation "$body_file" "$donation_image_url"
            gh release create "$RELEASE_TAG" "${apk_files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes-file "$body_file"
          fi

      - name: Publish LSP repository release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.LSP_REPO_TOKEN }}
          LSP_REPO: ${{ env.LSP_REPO }}
          LSP_TAG: ${{ needs.build-bridge.outputs.lsp_tag }}
          RELEASE_TAG: ${{ needs.build-bridge.outputs.release_tag }}
          VERSION_NAME: ${{ needs.build-bridge.outputs.version_name }}
        run: |
          set -euo pipefail
          mapfile -t apk_files < <(find dist -name '*.apk' -type f | sort)
          notes_file=".github/release-notes/${VERSION_NAME}.md"
          body_file="$RUNNER_TEMP/lsp-release-body.md"
          donation_image_url="https://raw.githubusercontent.com/${LSP_REPO}/main/PY_QR.png"
          notes="ColorOS Live Lyrics Bridge ${RELEASE_TAG}. Includes LyricProvider QQ Music, 163 Music, Apple Music, Poweramp, Spotify, and QiShui Music APKs as auxiliary release assets."
          append_donation() {
            local file="$1"
            local image_url="$2"
            perl -0pi -e 's/\n?<!-- donation:start -->.*?<!-- donation:end -->\n?/\n/s' "$file"
            {
              printf '\n\n<!-- donation:start -->\n'
              printf '## Donate\n\n'
              printf '<img src="%s" alt="WeChat and Alipay donation QR code" width="600" height="400">\n' "$image_url"
              printf '<!-- donation:end -->\n'
            } >> "$file"
          }
          if gh release view "$LSP_TAG" --repo "$LSP_REPO" >/dev/null 2>&1; then
            if [[ -f "$notes_file" ]]; then
              cp "$notes_file" "$body_file"
            else
              gh release view "$LSP_TAG" \
                --repo "$LSP_REPO" \
                --json body \
                --jq '.body // ""' > "$body_file"
            fi
            append_donation "$body_file" "$donation_image_url"
            gh release edit "$LSP_TAG" \
              --repo "$LSP_REPO" \
              --title "$RELEASE_TAG" \
              --notes-file "$body_file"
            gh release upload "$LSP_TAG" "${apk_files[@]}" --repo "$LSP_REPO" --clobber
          elif [[ -f "$notes_file" ]]; then
            cp "$notes_file" "$body_file"
            append_donation "$body_file" "$donation_image_url"
            gh release create "$LSP_TAG" "${apk_files[@]}" \
              --repo "$LSP_REPO" \
              --title "$RELEASE_TAG" \
              --notes-file "$body_file"
          else
            printf '%s\n' "$notes" > "$body_file"
            append_donation "$body_file" "$donation_image_url"
            gh release create "$LSP_TAG" "${apk_files[@]}" \
              --repo "$LSP_REPO" \
              --title "$RELEASE_TAG" \
              --notes-file "$body_file"
          fi
